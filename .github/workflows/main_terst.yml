# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - terst

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: crlyr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_30DEFA63EBEF4A24AD9B2CFD7E4B0ADA }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_E5EDD8769A02407C95E3876A464C8161 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: crlyr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_30DEFA63EBEF4A24AD9B2CFD7E4B0ADA }}/guestbook-app:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_5E3A1E9352BD4A85AAFA4EA581E0A939 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_76962FFD424C4135A4F0E2FB4F5737E7 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_0CFF2DAA194B4996AAC76D327981B6FC }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'terst'
          slot-name: 'Production'
          images: 'crlyr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_30DEFA63EBEF4A24AD9B2CFD7E4B0ADA }}/guestbook-app:${{ github.sha }}'
          